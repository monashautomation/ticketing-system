apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ticketing-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ORG/ticketing-system.git
    targetRevision: main
    path: deploy/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ticketing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
