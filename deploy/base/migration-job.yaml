apiVersion: batch/v1
kind: Job
metadata:
  name: ticketing-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/monashautomation/ticketing-migrate:latest
          envFrom:
            - secretRef:
                name: ticketing-web-secrets
