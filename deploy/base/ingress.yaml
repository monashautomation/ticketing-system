apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - tickets.example.com
      secretName: ticketing-web-tls
  rules:
    - host: tickets.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticketing-web
                port:
                  number: 80
