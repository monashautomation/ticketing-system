apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ticketing-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-postgres
  labels:
    app: ticketing-postgres
spec:
  replicas: 1 # single-writer PVC (ReadWriteOnce) — do not scale
  revisionHistoryLimit: 3
  strategy:
    type: Recreate # avoid two pods mounting the same RWO volume during rollout
  selector:
    matchLabels:
      app: ticketing-postgres
  template:
    metadata:
      labels:
        app: ticketing-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: POSTGRES_DB
              value: ticketing
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ticketing-postgres-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticketing-postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
          readinessProbe:
            exec:
              command: ['sh', '-c', 'pg_isready -h /var/run/postgresql -U "$POSTGRES_USER"']
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ['sh', '-c', 'pg_isready -h /var/run/postgresql -U "$POSTGRES_USER"']
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ticketing-postgres-data
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-postgres
spec:
  selector:
    app: ticketing-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
