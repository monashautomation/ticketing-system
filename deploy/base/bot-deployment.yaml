apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-bot
  labels:
    app: ticketing-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticketing-bot
  template:
    metadata:
      labels:
        app: ticketing-bot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: bot
          image: ghcr.io/monashautomation/ticketing-bot:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: ticketing-bot-config
            - secretRef:
                name: ticketing-bot-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
