# Not applied directly. Real secrets live in OpenBao (kv put ticketing/web ...)
# and are synced into the cluster via External Secrets Operator (ESO)
# ExternalSecret resources pulling from the vault SecretStore. This file
# documents the expected shape only:
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-web-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@host:5432/ticketing"
  BETTER_AUTH_SECRET: ""
  AUTHENTIK_CLIENT_ID: ""
  AUTHENTIK_CLIENT_SECRET: ""
  AUTHENTIK_API_TOKEN: ""
  INTERNAL_API_SECRET: ""
  UPTIME_KUMA_WEBHOOK_SECRET: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-bot-secrets
type: Opaque
stringData:
  DISCORD_TOKEN: ""
  DISCORD_CLIENT_ID: ""
  INTERNAL_API_SECRET: ""
  DISCORD_DM_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-postgres-secrets
type: Opaque
stringData:
  POSTGRES_USER: "ticketing"
  POSTGRES_PASSWORD: ""
---
# S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY above must match MINIO_ROOT_USER /
# MINIO_ROOT_PASSWORD here — same credentials, minio is the auth source.
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-minio-secrets
type: Opaque
stringData:
  MINIO_ROOT_USER: ""
  MINIO_ROOT_PASSWORD: ""
