apiVersion: v1
kind: ServiceAccount
metadata:
  name: ticketing-eso
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: ticketing-vault
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "ticketing"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "ticketing"
          serviceAccountRef:
            name: ticketing-eso
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ticketing-web-secrets
spec:
  secretStoreRef:
    name: ticketing-vault
    kind: SecretStore
  target:
    name: ticketing-web-secrets
  refreshInterval: 1h
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: web
        property: DATABASE_URL
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: web
        property: BETTER_AUTH_SECRET
    - secretKey: AUTHENTIK_CLIENT_ID
      remoteRef:
        key: web
        property: AUTHENTIK_CLIENT_ID
    - secretKey: AUTHENTIK_CLIENT_SECRET
      remoteRef:
        key: web
        property: AUTHENTIK_CLIENT_SECRET
    - secretKey: AUTHENTIK_API_TOKEN
      remoteRef:
        key: web
        property: AUTHENTIK_API_TOKEN
    - secretKey: INTERNAL_API_SECRET
      remoteRef:
        key: web
        property: INTERNAL_API_SECRET
    - secretKey: UPTIME_KUMA_WEBHOOK_SECRET
      remoteRef:
        key: web
        property: UPTIME_KUMA_WEBHOOK_SECRET
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: web
        property: S3_ACCESS_KEY_ID
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: web
        property: S3_SECRET_ACCESS_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ticketing-bot-secrets
spec:
  secretStoreRef:
    name: ticketing-vault
    kind: SecretStore
  target:
    name: ticketing-bot-secrets
  refreshInterval: 1h
  data:
    - secretKey: INTERNAL_API_SECRET
      remoteRef:
        key: bot
        property: INTERNAL_API_SECRET
    - secretKey: DISCORD_DM_API_KEY
      remoteRef:
        key: bot
        property: DISCORD_DM_API_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ticketing-minio-secrets
spec:
  secretStoreRef:
    name: ticketing-vault
    kind: SecretStore
  target:
    name: ticketing-minio-secrets
  refreshInterval: 1h
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: minio
        property: MINIO_ROOT_USER
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: minio
        property: MINIO_ROOT_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ticketing-postgres-secrets
spec:
  secretStoreRef:
    name: ticketing-vault
    kind: SecretStore
  target:
    name: ticketing-postgres-secrets
  refreshInterval: 1h
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: postgres
        property: POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: postgres
        property: POSTGRES_PASSWORD
