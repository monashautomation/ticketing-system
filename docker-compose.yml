services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
      POSTGRES_DB: ticketing
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ticketing']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    environment:
      DATABASE_URL: postgresql://ticketing:ticketing@postgres:5432/ticketing?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-ticketing-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-ticketing-minio-secret}
      # Presigned upload/download URLs are handed to the browser, which enforces CORS on the
      # direct PUT/GET against MinIO -- without this, uploads fail silently with a CORS error.
      MINIO_API_CORS_ALLOW_ORIGIN: ${PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-ticketing-minio} ${S3_SECRET_ACCESS_KEY:-ticketing-minio-secret} &&
      mc mb -p local/${S3_BUCKET:-ticketing-attachments}
      "

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://ticketing:ticketing@postgres:5432/ticketing?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me-32-bytes-min}
      BETTER_AUTH_URL: http://localhost:3000
      PUBLIC_APP_URL: http://localhost:3000
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN}
      ADMIN_GROUPS: ${ADMIN_GROUPS:-ticketing-admins}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret}
      UPTIME_KUMA_WEBHOOK_SECRET: ${UPTIME_KUMA_WEBHOOK_SECRET:-dev-kuma-secret}
      # Must be browser-reachable: presigned URLs are handed to the client, not fetched server-side.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
      # Used for server-side calls (delete, cleanup) which run inside the web container.
      S3_INTERNAL_ENDPOINT: ${S3_INTERNAL_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-ticketing-attachments}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-ticketing-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-ticketing-minio-secret}
      S3_FORCE_PATH_STYLE: 'true'
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    environment:
      INTERNAL_API_URL: http://web:3000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-internal-secret}
      DISCORD_DM_API_URL: ${DISCORD_DM_API_URL:-}
      DISCORD_DM_API_KEY: ${DISCORD_DM_API_KEY}
    depends_on:
      - web

volumes:
  postgres-data:
  minio-data:
